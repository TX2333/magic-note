workflows:
  android:
    name: Flutter Android APK
    max_build_duration: 30
    environment:
      flutter: 3.13.7
    scripts:
      - name: 清理并获取依赖
        script: |
          flutter clean
          flutter pub get
          
      - name: 构建 Release APK
        script: |
          flutter build apk --release --no-tree-shake-icons
          
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
    publishing:
      email:
        recipients:
          - your-email@example.com
