workflows:
  magic-note-apk:
    name: 魔法笔记 APK 构建
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.13.9
      groups:
        - default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: 安装依赖
        script: |
          flutter clean
          flutter pub get
      - name: 构建 Release APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/apk/release/app-release.apk
      - build/app/outputs/flutter-apk/app-release.apk
      - build/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
