name: 🔨 构建 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: 📦 构建 Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
          cache: true
      
      - name: 📦 安装依赖
        run: |
          flutter clean
          flutter pub get
      
      - name: 🔧 让 Flutter 准备所有文件（不构建，只准备）
        run: |
          # 只让 Flutter 准备 Gradle wrapper 和配置文件
          flutter build apk --debug 2>&1 | head -50 || true
      
      - name: 🚀 直接用 Gradle 构建 Release APK（完全绕过 Flutter 工具！）
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace 2>&1 | tail -50
      
      - name: 🔍 查找所有 APK 文件
        run: |
          echo "=== 查找 APK ==="
          find . -name "*.apk" -type f
          echo ""
          echo "=== build 目录结构 ==="
          ls -la build/app/outputs/ 2>/dev/null || true
          ls -la android/app/build/outputs/ 2>/dev/null || true
      
      - name: 📤 上传 APK 到构建结果
        uses: actions/upload-artifact@v4
        with:
          name: 魔法笔记-APK
          path: |
            build/app/outputs/apk/release/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk
            **/*.apk
          retention-days: 30