name: 🔨 构建 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-apk:
    name: 📦 构建 Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
          cache: true
      
      - name: 📦 安装依赖
        run: flutter pub get
      
      - name: 🔍 调试：列出 android 目录内容
        run: ls -la android/
      
      - name: 🔨 【直接用 Gradle 构建！绕过 Flutter 工具 Bug！】
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleRelease --stacktrace 2>&1 | tail -100
      
      - name: 🔍 调试：列出整个 build 目录（找 APK！）
        run: ls -laR build/ 2>&1 | head -200
      
      - name: 🔍 调试：搜索所有 APK 文件
        run: find build -name "*.apk" -type f
      
      - name: 📤 上传 APK（所有可能的路径）
        uses: actions/upload-artifact@v4
        with:
          name: 魔法笔记-APK
          path: |
            build/app/outputs/apk/release/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/apk/*release*.apk
            build/**/*.apk
            android/build/**/*.apk
            android/app/build/**/*.apk
          if-no-files-found: error
          retention-days: 30
      
      - name: ✅ 完成
        run: echo "🎉 APK 构建完成！"
