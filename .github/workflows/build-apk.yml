name: 🔨 构建 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-apk:
    name: 📦 构建 Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
          cache: true
      
      - name: 📦 安装依赖
        run: flutter pub get
      
      - name: 🔨 构建 Release APK（完整输出）
        run: flutter build apk --release --verbose
      
      - name: 🔍 调试：列出构建输出目录
        run: ls -la build/app/outputs/
      
      - name: 🔍 调试：列出所有 APK 候选路径
        run: find build -name "*.apk"
      
      - name: 📤 上传 APK 到构建结果
        uses: actions/upload-artifact@v4
        with:
          name: 魔法笔记-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error  # 找不到文件就报错
          retention-days: 30  # 保留30天
      
      - name: ✅ 完成
        run: echo "🎉 APK 构建完成！"
