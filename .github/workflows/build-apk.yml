name: 🔨 构建 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-apk:
    name: 📦 构建 Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐦 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.9'
          channel: 'stable'
          cache: true
      
      - name: 📦 安装依赖
        run: flutter pub get
      
      - name: 🔍 调试：构建前列出 android 目录内容
        run: ls -la android/
      
      - name: 🔧 【关键！】让 Flutter 生成缺失的 Gradle wrapper 文件！
        run: flutter create --platforms android . 2>&1 | tail -30
      
      - name: 🔍 调试：构建后列出 android 目录内容
        run: ls -la android/
      
      - name: 🔨 直接用 Gradle 构建 APK
        run: |
          chmod +x android/gradlew
          ./android/gradlew -p android assembleRelease --stacktrace 2>&1 | tail -100
      
      - name: 🔍 调试：列出整个构建目录（找 APK！）
        run: find . -name "*.apk" -type f 2>/dev/null
      
      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 魔法笔记-APK
          path: |
            **/app-release.apk
            **/*release*.apk
          if-no-files-found: error
          retention-days: 30
      
      - name: ✅ 完成
        run: echo "🎉 APK 构建完成！"
