<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 魔法写字本 ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            overflow: hidden;
            cursor: crosshair;
        }

        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(100, 255, 218, 0.6);
            box-shadow: 0 0 6px rgba(100, 255, 218, 0.8);
            pointer-events: none;
        }

        #breathing-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(to top, rgba(100, 255, 218, 0.15), transparent);
            animation: breathe 4s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes breathe {
            0% { opacity: 0.2; }
            100% { opacity: 0.5; }
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        #drawing-canvas {
            width: 100%;
            height: 100%;
        }

        .toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            background: rgba(20, 20, 40, 0.8);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(100, 255, 218, 0.3);
            backdrop-filter: blur(10px);
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(100, 255, 218, 0.1);
            color: #64FFDA;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn:hover {
            background: rgba(100, 255, 218, 0.3);
            transform: scale(1.1);
        }

        .tool-btn.active {
            background: rgba(100, 255, 218, 0.4);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.5);
        }

        .color-picker {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(100, 255, 218, 0.5);
            cursor: pointer;
            overflow: hidden;
        }

        .color-picker input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .size-slider {
            width: 80px;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .size-slider input {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(100, 255, 218, 0.2);
            height: 4px;
            border-radius: 2px;
        }

        .size-slider input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #64FFDA;
            border-radius: 50%;
            cursor: pointer;
        }

        .response-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 600px;
            width: 90%;
            background: rgba(20, 20, 40, 0.9);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid rgba(100, 255, 218, 0.3);
            z-index: 100;
            display: none;
            animation: panel-appear 0.5s ease-out;
            backdrop-filter: blur(10px);
        }

        .response-panel.show {
            display: block;
        }

        @keyframes panel-appear {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .response-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .response-title {
            color: #64FFDA;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #64FFDA;
        }

        .response-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 15px;
        }

        .hint {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 255, 218, 0.4);
            font-size: 14px;
            z-index: 50;
            text-align: center;
            pointer-events: none;
            animation: hint-pulse 3s ease-in-out infinite;
        }

        @keyframes hint-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .status-dot {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #64FFDA;
            z-index: 100;
            animation: status-blink 2s infinite;
        }

        .status-dot.thinking {
            animation: status-thinking 0.5s infinite;
        }

        @keyframes status-blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes status-thinking {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.5); }
        }

        .ai-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64FFDA, #00E676);
            border: none;
            font-size: 24px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.4);
            transition: all 0.3s ease;
        }

        .ai-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.6);
        }

        .ai-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ink-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: ink-fade 1s ease-out forwards;
        }

        @keyframes ink-fade {
            0% {
                opacity: 0.8;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(2);
            }
        }

        .zoom-controls {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(100, 255, 218, 0.3);
            color: #64FFDA;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .zoom-btn:hover {
            background: rgba(100, 255, 218, 0.3);
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div id="breathing-glow"></div>

    <div class="toolbar">
        <button class="tool-btn active" id="pen-btn" title="画笔">✏️</button>
        <button class="tool-btn" id="eraser-btn" title="橡皮擦">🧹</button>
        <button class="tool-btn" id="clear-btn" title="清空画布">🗑️</button>
        <div class="color-picker" title="选择颜色">
            <input type="color" id="color-picker" value="#64FFDA">
        </div>
        <div class="size-slider" title="笔触大小">
            <input type="range" id="size-slider" min="1" max="20" value="4">
        </div>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-in" title="放大">+</button>
        <button class="zoom-btn" id="zoom-reset" title="重置">⌂</button>
        <button class="zoom-btn" id="zoom-out" title="缩小">−</button>
    </div>

    <div id="canvas-container">
        <canvas id="drawing-canvas"></canvas>
    </div>

    <div class="hint">
        ✨ 在画布上写字，AI 会识别内容并给出神秘回应 ✨<br>
        <small style="opacity:0.6">按住空格拖动 | 滚轮缩放 | 右键立即询问 | 双击清除</small>
    </div>

    <button class="ai-btn" id="ai-btn" title="询问 AI">✨</button>

    <div class="status-dot" id="status-dot"></div>

    <div class="response-panel" id="response-panel">
        <div class="response-header">
            <span class="response-title">✨ 魔法回应</span>
            <button class="close-btn" onclick="closeResponse()">×</button>
        </div>
        <div class="response-content" id="response-content"></div>
    </div>

    <script>
        // 画布设置
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const particlesContainer = document.getElementById('particles-container');

        // 画布状态
        let isDrawing = false;
        let isDragging = false;
        let isEraser = false;
        let lastX = 0;
        let lastY = 0;
        let offsetX = 0;
        let offsetY = 0;
        let scale = 1;
        let penColor = '#64FFDA';
        let penSize = 4;
        let drawingHistory = [];
        let currentPath = [];
        let fadeTimer = null;

        // AI 状态
        let isThinking = false;
        let aiTimer = null;         // ⭐ AI 触发计时器
        let fadeStartTimer = null;  // ⭐ 淡出开始计时器
        let fadeTimer = null;       // 淡出动画帧计时器
        let lastDrawTime = 0;

        // 初始化画布大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            redraw();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 背景粒子
        function spawnBackgroundParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 2 + 1;
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.opacity = Math.random() * 0.3 + 0.1;
            particle.style.animation = `float-up ${3 + Math.random() * 2}s ease-out forwards`;
            
            particlesContainer.appendChild(particle);
            
            setTimeout(() => particle.remove(), 5000);
        }

        setInterval(spawnBackgroundParticle, 500);

        // 墨水粒子效果
        function spawnInkParticles(x, y, color) {
            for (let i = 0; i < 3; i++) {
                const particle = document.createElement('div');
                particle.className = 'ink-particle';
                
                const size = Math.random() * 4 + 2;
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = (x + offsetX) + 'px';
                particle.style.top = (y + offsetY) + 'px';
                particle.style.background = color;
                particle.style.boxShadow = `0 0 ${size}px ${color}`;
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // 坐标转换 - 简化版，不使用缩放偏移
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // 开始绘制
        function startDrawing(e) {
            if (e.button === 2) return; // 右键不绘制
            if (spacePressed) return;   // 按住空格时不绘制
            
            isDrawing = true;
            const coords = getCanvasCoords(e);
            lastX = coords.x;
            lastY = coords.y;
            currentPath = [{ x: lastX, y: lastY }];
            
            spawnInkParticles(e.clientX, e.clientY, penColor);
        }

        // 绘制中
        function draw(e) {
            if (!isDrawing) return;
            
            const coords = getCanvasCoords(e);
            const x = coords.x;
            const y = coords.y;
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = isEraser ? '#0a0a1a' : penColor;
            ctx.lineWidth = isEraser ? penSize * 5 : penSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (!isEraser) {
                ctx.shadowColor = penColor;
                ctx.shadowBlur = 10;
            } else {
                ctx.shadowBlur = 0;
            }
            
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            currentPath.push({ x, y });
            
            // 绘制粒子效果
            if (Math.random() > 0.7 && !isEraser) {
                spawnInkParticles(e.clientX, e.clientY, penColor);
            }
            
            lastX = x;
            lastY = y;
            lastDrawTime = Date.now();
            
            // ⭐ 关键：继续写字时，清除 ALL 计时器！
            if (aiTimer) clearTimeout(aiTimer);
            if (fadeStartTimer) clearTimeout(fadeStartTimer);
        }

        // 停止绘制
        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            
            if (currentPath.length > 0) {
                const newStroke = {
                    path: [...currentPath],
                    color: isEraser ? '#0a0a1a' : penColor,
                    size: isEraser ? penSize * 5 : penSize,
                    isEraser,
                    opacity: 1,
                    createdAt: Date.now()
                };
                drawingHistory.push(newStroke);
                currentPath = [];
            }
            
            // ⭐ 关键：清除 ALL 计时器！（包括 AI 触发和墨迹淡出）
            if (aiTimer) clearTimeout(aiTimer);
            if (fadeStartTimer) clearTimeout(fadeStartTimer);
            
            // 停笔 2 秒后触发 AI（正常思考时间）
            aiTimer = setTimeout(() => {
                if (!isThinking && drawingHistory.length > 0) {
                    triggerAIResponse();
                }
            }, 2000);
            
            // 停笔 2.5 秒后开始淡出
            fadeStartTimer = setTimeout(() => {
                fadeInk();
            }, 2500);
        }

        // 墨迹淡出效果
        function fadeInk() {
            let fadeStartTime = Date.now();
            const fadeDuration = 1500; // 1.5秒淡出
            
            function animate() {
                const elapsed = Date.now() - fadeStartTime;
                const progress = Math.min(elapsed / fadeDuration, 1);
                
                // 更新所有笔迹的透明度
                drawingHistory.forEach(stroke => {
                    stroke.opacity = Math.max(0, 1 - progress);
                });
                
                redraw();
                
                // 在墨迹快消失时添加粒子效果
                if (progress > 0.6 && progress < 0.9) {
                    if (Math.random() > 0.7) {
                        drawingHistory.forEach(stroke => {
                            if (stroke.path.length > 0 && !stroke.isEraser) {
                                const point = stroke.path[Math.floor(Math.random() * stroke.path.length)];
                                spawnMagicParticles(point.x, point.y, stroke.color);
                            }
                        });
                    }
                }
                
                if (progress < 1) {
                    fadeTimer = requestAnimationFrame(animate);
                } else {
                    // 淡出完成后添加爆发粒子
                    drawingHistory.forEach(stroke => {
                        if (stroke.path.length > 0 && !stroke.isEraser) {
                            stroke.path.forEach(point => {
                                if (Math.random() > 0.8) {
                                    spawnMagicParticles(point.x, point.y, stroke.color);
                                }
                            });
                        }
                    });
                    
                    // 清空历史
                    drawingHistory = [];
                    redraw();
                }
            }
            
            animate();
        }

        // 魔法粒子效果
        function spawnMagicParticles(x, y, color) {
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'ink-particle';
                
                const size = Math.random() * 6 + 2;
                const offsetX = (Math.random() - 0.5) * 40;
                const offsetY = (Math.random() - 0.5) * 40;
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = (x + offsetX) + 'px';
                particle.style.top = (y + offsetY) + 'px';
                particle.style.background = color;
                particle.style.boxShadow = `0 0 ${size * 2}px ${color}`;
                
                particlesContainer.appendChild(particle);
                
                setTimeout(() => particle.remove(), 1500);
            }
        }

        // 重绘画布 - 简化版
        function redraw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (const item of drawingHistory) {
                if (item.path.length < 2) continue;
                
                ctx.globalAlpha = item.opacity !== undefined ? item.opacity : 1;
                ctx.beginPath();
                ctx.moveTo(item.path[0].x, item.path[0].y);
                
                for (let i = 1; i < item.path.length; i++) {
                    ctx.lineTo(item.path[i].x, item.path[i].y);
                }
                
                ctx.strokeStyle = item.color;
                ctx.lineWidth = item.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (!item.isEraser) {
                    ctx.shadowColor = item.color;
                    ctx.shadowBlur = 10;
                }
                
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        // 画布拖动
        let dragStartX = 0, dragStartY = 0;
        
        function startDrag(e) {
            if (e.button !== 1 && !e.which !== 3) return; // 中键或右键拖动
            isDragging = true;
            dragStartX = e.clientX - offsetX;
            dragStartY = e.clientY - offsetY;
        }

        function drag(e) {
            if (!isDragging) return;
            offsetX = e.clientX - dragStartX;
            offsetY = e.clientY - dragStartY;
            redraw();
        }

        function stopDrag() {
            isDragging = false;
        }

        // 缩放
        function zoom(factor, centerX, centerY) {
            const oldScale = scale;
            scale *= factor;
            scale = Math.max(0.1, Math.min(5, scale));
            
            const actualFactor = scale / oldScale;
            offsetX = centerX - (centerX - offsetX) * actualFactor;
            offsetY = centerY - (centerY - offsetY) * actualFactor;
            
            redraw();
        }

        // 事件监听
        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1 || e.button === 2) {
                startDrag(e);
            } else {
                startDrawing(e);
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                drag(e);
            } else {
                draw(e);
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            stopDrawing();
            stopDrag();
        });
        
        canvas.addEventListener('mouseleave', () => {
            stopDrawing();
            stopDrag();
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                startDrawing(e);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        });
        
        canvas.addEventListener('touchend', stopDrawing);

        // 滚轮缩放
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const factor = e.deltaY > 0 ? 0.9 : 1.1;
            zoom(factor, e.clientX, e.clientY);
        });

        // 阻止右键菜单
        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            if (!isThinking && drawingHistory.length > 0) {
                triggerAIResponse();
            }
        });

        // 工具栏按钮
        document.getElementById('pen-btn').addEventListener('click', function() {
            isEraser = false;
            document.getElementById('pen-btn').classList.add('active');
            document.getElementById('eraser-btn').classList.remove('active');
        });

        document.getElementById('eraser-btn').addEventListener('click', function() {
            isEraser = true;
            document.getElementById('eraser-btn').classList.add('active');
            document.getElementById('pen-btn').classList.remove('active');
        });

        document.getElementById('clear-btn').addEventListener('click', function() {
            if (confirm('确定要清空画布吗？')) {
                drawingHistory = [];
                redraw();
                closeResponse();
            }
        });

        document.getElementById('color-picker').addEventListener('input', function(e) {
            penColor = e.target.value;
        });

        document.getElementById('size-slider').addEventListener('input', function(e) {
            penSize = parseInt(e.target.value);
        });

        // 缩放控制
        document.getElementById('zoom-in').addEventListener('click', () => zoom(1.2, window.innerWidth / 2, window.innerHeight / 2));
        document.getElementById('zoom-out').addEventListener('click', () => zoom(0.8, window.innerWidth / 2, window.innerHeight / 2));
        document.getElementById('zoom-reset').addEventListener('click', () => {
            offsetX = 0;
            offsetY = 0;
            scale = 1;
            redraw();
        });

        // AI 按钮
        document.getElementById('ai-btn').addEventListener('click', () => {
            if (!isThinking && drawingHistory.length > 0) {
                triggerAIResponse();
            }
        });

        // 触发 AI 回应
        async function triggerAIResponse() {
            if (isThinking) return;
            isThinking = true;
            
            const statusDot = document.getElementById('status-dot');
            statusDot.classList.add('thinking');
            document.getElementById('ai-btn').disabled = true;

            try {
                // ⭐ 立即捕获画布内容（在墨迹消失前）
                const imageData = canvas.toDataURL('image/png');
                
                console.log('🖼️  正在识别手写内容...');
                const response = await callAIWithImage(imageData);
                showResponse(response);
            } catch (error) {
                console.error('识别失败:', error);
                showResponse("✨ 你的文字已被记录在这本魔法书中，在星光下静静闪耀...");
            }

            isThinking = false;
            statusDot.classList.remove('thinking');
            document.getElementById('ai-btn').disabled = false;
        }

        // 调用 AI 图片识别
        async function callAIWithImage(imageData) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                if (!response.ok) throw new Error('API 请求失败');
                const data = await response.json();
                return data.response;
            } catch (error) {
                console.error('AI API 调用失败:', error);
                const fallbackResponses = [
                    "我感受到了你笔尖流淌的思绪，每一道墨迹都承载着独特的意义。它们在星光下交织、共鸣，形成了只属于你的魔法诗篇。✨",
                    "你的笔触充满了力量，我能感受到其中蕴含的情感与思考。这不仅是书写，更是灵魂的对话。🌙",
                    "是的，我明白你想表达的。有时候最深刻的话语不需要语言，一笔一画就是心与心的交流。💫",
                    "墨迹在纸上绽放，如同宇宙中的星辰。你的每一个动作都在创造新的魔法，让这本笔记变得更加独特。🔮",
                ];
                return fallbackResponses[Math.floor(Math.random() * fallbackResponses.length)];
            }
        }

        // 显示回应
        function showResponse(text) {
            const panel = document.getElementById('response-panel');
            const content = document.getElementById('response-content');
            
            panel.classList.add('show');
            
            // 逐字显示
            content.textContent = '';
            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    content.textContent += text[i];
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 50);
        }

        // 关闭回应
        function closeResponse() {
            document.getElementById('response-panel').classList.remove('show');
        }

        // 空格拖动
        let spacePressed = false;
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !spacePressed) {
                spacePressed = true;
                canvas.style.cursor = 'grab';
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
                canvas.style.cursor = 'crosshair';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (spacePressed) {
                offsetX += e.movementX;
                offsetY += e.movementY;
                redraw();
            }
        });
    </script>
</body>
</html>
